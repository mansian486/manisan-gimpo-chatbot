<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마니산닭강정 김포직영점</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#EF9F27;--dark:#d4861a;--light:#FAEEDA;
  --bg:#FDF8F0;--surface:#fff;--border:#F0E6D3;
  --text:#2C1A0E;--sub:#8B6A4E;--radius:18px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.wrap{width:100%;max-width:420px;background:var(--surface);border-radius:24px;box-shadow:0 8px 40px rgba(239,159,39,0.15);overflow:hidden;display:flex;flex-direction:column;height:90vh;max-height:900px}

/* 헤더 */
.header{background:var(--primary);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{width:38px;height:38px;border-radius:50%;overflow:hidden;background:#fff;flex-shrink:0}
.logo img{width:100%;height:100%;object-fit:cover}
.hinfo .name{font-size:14px;font-weight:700;color:#fff;line-height:1.3}
.hinfo .sub{font-size:11px;color:rgba(255,255,255,0.85);margin-top:2px}
.hright{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.tel{background:rgba(255,255,255,0.25);border:none;border-radius:16px;padding:5px 10px;font-size:12px;color:#fff;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;text-decoration:none}
.tel:hover{background:rgba(255,255,255,0.4)}
.badge{background:rgba(255,255,255,0.2);border-radius:20px;padding:3px 8px;font-size:11px;color:#fff;display:flex;align-items:center;gap:4px}
.dot{width:6px;height:6px;border-radius:50%;background:#7FE87F}

/* 영업시간 */
.banner{background:#fff8ee;border-bottom:1px solid var(--border);padding:5px 14px;font-size:11px;color:var(--sub);flex-shrink:0}
.banner strong{color:var(--text)}

/* 메시지 */
.msgs{flex:1;overflow-y:auto;padding:12px 14px 8px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;min-height:0}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.msg{display:flex;gap:8px;align-items:flex-end}
.msg.bot{flex-direction:row}
.msg.user{flex-direction:row-reverse}
.bicon{width:30px;height:30px;border-radius:50%;background:var(--light);flex-shrink:0;overflow:hidden}
.bicon img{width:100%;height:100%;object-fit:cover}
.bubble{padding:11px 15px;border-radius:var(--radius);font-size:14px;line-height:1.65;max-width:78%;color:var(--text);word-break:keep-all}
.bot .bubble{background:#fff;border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.user .bubble{background:var(--primary);color:var(--text);border-bottom-right-radius:4px;font-weight:500}

/* 예/아니요 */
.yn{display:flex;gap:8px;margin-top:10px}
.yn button{flex:1;padding:10px 0;border-radius:12px;border:1.5px solid var(--primary);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.yn .yes{background:var(--primary);color:var(--text)}
.yn .no{background:#fff;color:var(--dark)}
.yn button:disabled{opacity:.4;cursor:default}

/* 타이핑 */
.typing{background:#fff;border:1px solid var(--border);border-radius:var(--radius);border-bottom-left-radius:4px;padding:14px 18px;display:flex;gap:5px;align-items:center}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--primary);animation:bounce 1.2s infinite;display:block}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* 장바구니 */
.cart{margin:0;border-top:1px solid var(--border);background:#fff;flex-shrink:0;display:none}
.cart.visible{display:block}
.cart-header{padding:7px 14px 4px;display:flex;align-items:center;justify-content:space-between}
.cart-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
.cart-badge{background:var(--primary);color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.cart-clear{font-size:11px;color:var(--sub);cursor:pointer;border:none;background:none;font-family:inherit}
.warm-opt-btn{background:var(--light);border:1px solid var(--primary);border-radius:8px;padding:2px 7px;font-size:10px;font-weight:600;color:var(--dark);cursor:pointer;margin-top:3px;display:inline-block;white-space:nowrap}
.warm-opt-btn:hover{background:var(--primary);color:#fff}
.cart-items{padding:0 14px;display:flex;flex-direction:column;gap:6px;overflow-y:visible}
.cart-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.cart-item:last-child{border-bottom:none}
.ci-name{flex:1;font-size:13px;color:var(--text);font-weight:500}
.ci-price{font-size:12px;color:var(--sub);margin-right:8px}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qty-btn{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);background:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);font-weight:700;flex-shrink:0}
.qty-btn:hover{border-color:var(--primary);background:var(--light)}
.qty-num{font-size:13px;font-weight:700;color:var(--text);min-width:16px;text-align:center}
.cart-footer{padding:6px 14px 8px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);margin-top:4px}
.cart-total{font-size:14px;font-weight:700;color:var(--text)}
.cart-total span{color:var(--primary)}
.order-btn{background:var(--primary);color:var(--text);border:none;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.order-btn:hover{background:var(--dark)}

/* 메인메뉴 그리드 */
.grid{padding:6px 14px 4px;display:grid;grid-template-columns:1fr 1fr;gap:5px;flex-shrink:0;border-top:1px solid var(--border);background:var(--bg)}
.mbtn{background:var(--surface);border:1.5px solid var(--primary);border-radius:14px;padding:0;font-size:13px;font-weight:600;color:var(--dark);cursor:pointer;font-family:inherit;transition:all .15s;text-align:left;overflow:hidden;display:flex;align-items:center;gap:0}
.mbtn:hover{background:var(--light)}
.mbtn .mimg{width:36px;height:36px;object-fit:cover;flex-shrink:0}
.mbtn .minfo{padding:4px 6px}
.mbtn .mname{font-size:11px;font-weight:700;color:var(--text);display:block}
.mbtn .mprice{font-size:10px;font-weight:400;color:var(--sub);display:block;margin-top:1px}

/* 사이드메뉴 토글 */
.side-wrap{padding:0 14px 4px;flex-shrink:0;background:var(--bg)}
.side-toggle{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:9px 14px;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:space-between;transition:all .15s}
.side-toggle:hover{border-color:var(--primary);color:var(--dark)}
.arrow{transition:transform .3s;display:inline-block}
.side-toggle.open .arrow{transform:rotate(180deg)}
.side-list{display:none;flex-direction:column;gap:4px;margin-top:4px}
.side-list.open{display:flex}
.sbtn{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:6px 12px;font-size:12px;font-weight:500;color:var(--text);cursor:pointer;font-family:inherit;display:flex;justify-content:space-between;align-items:center;transition:all .15s}
.sbtn:hover{border-color:var(--primary);background:var(--light)}
.sbtn .sprice{font-size:12px;color:var(--sub)}

.side-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:4px}
.sgbtn{background:var(--surface);border:1.5px solid var(--primary);border-radius:9px;padding:0;font-size:9px;font-weight:600;color:var(--dark);cursor:pointer;font-family:inherit;transition:all .15s;text-align:left;overflow:hidden;display:flex;align-items:center;gap:0}
.sgbtn:hover{background:var(--light)}
.sgbtn .sgimg{width:24px;height:24px;object-fit:cover;flex-shrink:0}
.sgbtn .sginfo{padding:3px 4px}
.sgbtn .sgname{font-size:7px;font-weight:700;color:var(--text);display:block;line-height:1.2}
.sgbtn .sgprice{font-size:7px;font-weight:400;color:var(--sub);display:block;margin-top:1px}

/* 기타버튼 */
.etc{padding:0 14px 5px;display:flex;gap:6px;flex-shrink:0;background:var(--bg)}
.qbtn{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:6px 8px;font-size:11px;font-weight:500;color:var(--sub);cursor:pointer;font-family:inherit;white-space:nowrap;flex:1;text-align:center}
.qbtn:hover{border-color:var(--primary);color:var(--dark)}

/* 입력창 */
.inp-area{padding:7px 14px 10px;display:flex;gap:8px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.inp-area input{flex:1;padding:10px 16px;border-radius:24px;border:1.5px solid var(--border);background:var(--bg);font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:border-color .2s}
.inp-area input:focus{border-color:var(--primary)}
.inp-area input::placeholder{color:var(--sub)}
.send{width:40px;height:40px;border-radius:50%;background:var(--primary);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send:hover{background:var(--dark)}
.send svg{width:17px;height:17px;fill:white}

/* 지도 모달 */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:flex-end;justify-content:center}
.modal-box{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:420px}
.modal-title{text-align:center;font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.modal-addr{text-align:center;font-size:13px;color:var(--sub);margin-bottom:20px}
.map-btn{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:14px;border:1.5px solid var(--border);text-decoration:none;color:var(--text);font-weight:600;font-size:14px;margin-bottom:10px}
.map-btn:hover{background:#f9f9f9}
.close-btn{width:100%;margin-top:6px;padding:13px;border-radius:14px;border:none;background:#F5F5F5;font-size:14px;font-weight:600;color:var(--sub);cursor:pointer;font-family:inherit}

/* 품절 오버레이 */
.sold-out-btn { position:relative; pointer-events:auto; }
.sold-out-btn::after {
  content:'품절';
  position:absolute; inset:0;
  background:rgba(0,0,0,0.45);
  color:#fff; font-size:13px; font-weight:800;
  letter-spacing:1px;
  display:flex; align-items:center; justify-content:center;
  border-radius:inherit;
  pointer-events:none;
}
.sold-out-btn img { filter:grayscale(80%) brightness(0.7); }
/* 품절 관리 모달 */
#adminModal {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.55); z-index:9999;
  align-items:center; justify-content:center;
}
#adminModal.open { display:flex; }
.admin-box {
  background:#fff; border-radius:16px;
  padding:20px; width:320px; max-width:92vw;
  box-shadow:0 8px 32px rgba(0,0,0,.25);
}
.admin-box h3 { margin:0 0 14px; font-size:15px; color:#3a1a00; text-align:center; }
.admin-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:14px; }
.admin-item {
  display:flex; align-items:center; gap:6px;
  background:#fdf8f3; border:1.5px solid #e8d5b0;
  border-radius:9px; padding:7px 8px; font-size:11px;
  font-weight:600; color:#5a3a1a; cursor:pointer;
  transition:.15s; user-select:none;
}
.admin-item.soldout { background:#f0f0f0; border-color:#ccc; color:#999; text-decoration:line-through; }
.admin-item input[type=checkbox] { accent-color:#e05c2a; width:14px; height:14px; flex-shrink:0; }
.admin-close { width:100%; padding:9px; background:#e05c2a; color:#fff; border:none; border-radius:9px; font-size:13px; font-weight:700; cursor:pointer; }
.admin-close:hover { background:#c44d20; }
/* 비밀번호 입력 */
#pwModal {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.55); z-index:9998;
  align-items:center; justify-content:center;
}
#pwModal.open { display:flex; }
.pw-box {
  background:#fff; border-radius:16px;
  padding:24px 20px; width:280px; max-width:92vw;
  box-shadow:0 8px 32px rgba(0,0,0,.25); text-align:center;
}
.pw-box h3 { margin:0 0 16px; font-size:15px; color:#3a1a00; }
.pw-box input {
  width:100%; box-sizing:border-box;
  border:1.5px solid #e8d5b0; border-radius:9px;
  padding:10px 12px; font-size:16px; text-align:center;
  letter-spacing:4px; margin-bottom:12px;
  outline:none;
}
.pw-box input:focus { border-color:#e05c2a; }
.pw-btns { display:flex; gap:8px; }
.pw-btns button { flex:1; padding:10px; border:none; border-radius:9px; font-size:13px; font-weight:700; cursor:pointer; }
.pw-confirm { background:#e05c2a; color:#fff; }
.pw-confirm:hover { background:#c44d20; }
.pw-cancel { background:#f0e8d8; color:#5a3a1a; }

</style>

let history = [];
let cart = []; // {name, price, qty}
let orderState = null;

const msgsEl = document.getElementById('msgs');
const inpEl = document.getElementById('inp');

// ── 장바구니 ──
function addCart(name, price) {
  pushCart(name, price);
}

function showWarmOption(name, price) {
  addBot(
    `🍗 <strong>${name}</strong>을 선택하셨어요!<br><br>🔥 <strong>따뜻한 강정 옵션</strong> (+2,000원)을 추가하시겠어요?<br><small style="color:#8B6A4E">※ 기본은 식힘공정으로 바삭하게 제공됩니다</small>`,
    {
      yes: '✅ 따뜻하게요',
      no: '❌ 기본으로요',
      onYes: () => { pushCart(name + ' (따뜻한옵션)', price + 2000); },
      onNo: () => { pushCart(name, price); }
    }
  );
}

function addWarmOption(idx) {
  const item = cart[idx];
  if (!item) return;
  // 기존 아이템 가격에 2000원 추가, 이름에 따뜻한옵션 표기
  item.price += 2000;
  item.name = item.name + ' (따뜻한옵션)';
  renderCart();
  addBot('🔥 따뜻한 강정 옵션(+2,000원)이 추가됐어요!');
}

function pushCart(name, price) {
  const existing = cart.find(i => i.name === name);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({name, price, qty: 1});
  }
  renderCart();
  addBot(`🛒 <strong>${name}</strong>을 장바구니에 담았어요!`);
}

function changeQty(idx, delta) {
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  renderCart();
}

function clearCart() {
  cart = [];
  renderCart();
}

function renderCart() {
  const cartEl = document.getElementById('cart');
  const itemsEl = document.getElementById('cartItems');
  const countEl = document.getElementById('cartCount');
  const totalEl = document.getElementById('cartTotal');

  if (cart.length === 0) {
    cartEl.classList.remove('visible');
    return;
  }
  cartEl.classList.add('visible');

  const totalQty = cart.reduce((s,i) => s+i.qty, 0);
  const totalAmt = cart.reduce((s,i) => s+i.price*i.qty, 0);
  countEl.textContent = totalQty;
  totalEl.textContent = totalAmt.toLocaleString();

  // 아이템 수에 따라 cart-items 높이 동적 설정 (스크롤 없이 다 보이게)
  // 닭강정(warm버튼 있는것): ~62px, 일반: ~40px
  const estimatedHeight = cart.reduce((sum, item) => {
    const isChicken = item.name.includes('닭강정') && !item.name.includes('따뜻한옵션');
    return sum + (isChicken ? 64 : 42);
  }, cart.length * 6); // gap 포함
  itemsEl.style.maxHeight = estimatedHeight + 'px';
  itemsEl.style.overflowY = 'visible';

  itemsEl.innerHTML = cart.map((item, idx) => {
    const isChicken = item.name.includes('닭강정') && !item.name.includes('따뜻한옵션');
    const warmBtn = isChicken ? `<button class="warm-opt-btn" onclick="addWarmOption(${idx})">🔥따뜻한강정 +2,000원</button>` : '';
    return `
    <div class="cart-item" style="${isChicken ? 'flex-wrap:wrap;' : ''}">
      <div class="ci-name" style="flex:1;min-width:0">${item.name}</div>
      <div class="ci-price">${item.price.toLocaleString()}원</div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty(${idx},-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${idx},1)">+</button>
      </div>
      ${isChicken ? `<div style="width:100%;padding-bottom:4px">${warmBtn}</div>` : ''}
    </div>`;
  }).join('');
}

function startOrder() {

// ── 픽업시간 선택 UI ──
function showTimePickerAndMessage(total) {
  const menuItems = cart.map(i=>`🍗 ${i.name} x${i.qty} (${(i.price*i.qty).toLocaleString()}원)`).join('<br>');

  // 시간 옵션: 11시~22시 중 현재 시각 이후만 표시
  const now = new Date();
  const curH = now.getHours();
  const curM = now.getMinutes();
  // 11~22시 범위, 현재 시각 이후 (현재 시각이 00분이면 그 시간도 포함, 50분 초과면 다음 시부터)
  const hours = [];
  for (let h = 11; h <= 22; h++) {
    // 현재 시보다 크거나, 현재 시와 같고 아직 분이 남은 경우 포함
    if (h > curH || (h === curH && curM < 60)) hours.push(h);
  }

  const html = `📋 <strong>주문 내역</strong><br>${menuItems}<br><br>💰 합계: <strong>${total.toLocaleString()}원</strong>
<div id="timePicker" style="margin-top:12px;">
  <div style="background:#FEF3C7;border:1.5px solid #F59E0B;border-radius:12px;padding:12px 14px;font-size:14px;font-weight:600;color:#92400E;">
    ⏰ 픽업 예약 시간을 선택해주세요!
  </div>
  <div style="margin-top:10px;">
    <button onclick="selectHour('바로')" style="background:#EF9F27;color:#2C1A0E;border:none;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin:3px;">🚀 지금 바로</button>
  </div>
  <div id="hourBtns" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">
    ${hours.map(h=>`<button onclick="selectHour(${h})" style="background:#fff;border:1.5px solid #F0E6D3;border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;color:#2C1A0E;cursor:pointer;font-family:inherit;">${h}시</button>`).join('')}
  </div>
</div>`;

  addBot(html);
  setTimeout(() => {
    msgsEl.scrollTop = msgsEl.scrollHeight;
    document.getElementById('inp').focus();
  }, 100);
}

function selectHour(h) {
  if (h === '바로') {
    orderState.time = '지금 바로';
    confirmTimeSelection('지금 바로');
    return;
  }
  // 분 선택: 현재 시와 같으면 현재 분 이후의 10분 단위만 표시
  const now = new Date();
  const curH = now.getHours();
  const curM = now.getMinutes();
  const allMins = [0, 10, 20, 30, 40, 50];
  const mins = (h === curH)
    ? allMins.filter(m => m > curM)  // 현재 분 초과만
    : allMins;                         // 다른 시는 전부

  const pop = document.createElement('div');
  pop.id = 'minPop';
  pop.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
  pop.innerHTML = `<div style="background:#fff;border-radius:16px;padding:24px 20px;width:300px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2);">
    <div style="font-size:16px;font-weight:700;color:#2C1A0E;margin-bottom:16px">⏰ ${h}시 몇 분에 오시나요?</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px">
      ${mins.map(m=>`<button onclick="selectMin(${h},${m})" style="background:#fff;border:1.5px solid #EF9F27;border-radius:20px;padding:8px 16px;font-size:14px;font-weight:600;color:#2C1A0E;cursor:pointer;font-family:inherit;">${m===0?'정각':m+'분'}</button>`).join('')}
    </div>
    <button onclick="document.getElementById('minPop').remove()" style="background:#F5F5F5;color:#8B6A4E;border:none;border-radius:10px;padding:9px 20px;font-size:13px;cursor:pointer;font-family:inherit;">취소</button>
  </div>`;
  document.body.appendChild(pop);
}

function selectMin(h, m) {
  document.getElementById('minPop')?.remove();
  const timeStr = m === 0 ? `${h}시 정각` : `${h}시 ${m}분`;
  orderState.time = timeStr;
  confirmTimeSelection(timeStr);
}

function confirmTimeSelection(timeStr) {

      <button onclick="document.getElementById('timeConfirmPop').remove()" style="flex:1;background:#F5F5F5;color:#8B6A4E;border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">다시선택</button>

function confirmTimeDone(timeStr) {
  document.getElementById('timeConfirmPop')?.remove();
  // timePicker 숨기기
  document.getElementById('timePicker')?.remove();
  orderState.time = timeStr;
  orderState.step = 'name';
  addUser(`⏰ ${timeStr}`);
  document.getElementById('inp').placeholder = '성함을 알려주세요!';
  addBot('<div style="background:#E0F2FE;border:1.5px solid #38BDF8;border-radius:12px;padding:12px 14px;font-size:14px;font-weight:600;color:#0C4A6E;">👤 성함을 알려주세요!</div>');
  setTimeout(() => { msgsEl.scrollTop = msgsEl.scrollHeight; document.getElementById('inp').focus(); }, 100);
}

// ── 주문 단계 처리 ──
function handleStep(text) {
  if (!orderState) return false;
  if (orderState.step==='time') {
    // 픽업시간은 버튼 UI로 처리 - 텍스트 직접 입력도 허용
    orderState.time=text; orderState.step='name';
    document.getElementById('inp').placeholder = '성함을 알려주세요!';
    addBot('<div style="background:#E0F2FE;border:1.5px solid #38BDF8;border-radius:12px;padding:12px 14px;font-size:14px;font-weight:600;color:#0C4A6E;">👤 성함을 알려주세요!</div>');
    return true;
  }
  if (orderState.step==='name') {
    orderState.name=text; orderState.step='phone';
    document.getElementById('inp').setAttribute('inputmode','numeric');
    document.getElementById('inp').setAttribute('type','tel');
    document.getElementById('inp').placeholder = '연락처를 알려주세요!';
    addBot('<div style="background:#E0F2FE;border:1.5px solid #38BDF8;border-radius:12px;padding:12px 14px;font-size:14px;font-weight:600;color:#0C4A6E;">📱 연락처를 알려주세요!<br><span style="font-size:12px;font-weight:400;color:#0369A1;margin-top:4px;display:block">예) 010-1234-5678</span></div>');
    return true;
  }
  if (orderState.step==='phone') {
    orderState.phone=text; orderState.step='confirm';
    document.getElementById('inp').removeAttribute('inputmode');
    document.getElementById('inp').setAttribute('type','text');
    addBot(
      `📋 <strong>최종 주문 확인</strong><br><br>${orderState.menuText.split(', ').map(m=>`🍗 ${m}`).join('<br>')}<br><br>⏰ 픽업: ${orderState.time}<br>👤 ${orderState.name}님<br>📱 ${orderState.phone}<br>💰 합계: <strong>${orderState.total.toLocaleString()}원</strong><br><br>위 내용으로 주문 확정할까요?`,
      {
        yes: '✅ 네, 주문확정!',
        no: '✏️ 수정할게요',
        onYes: () => { finalOrder(); },
        onNo: () => {
          orderState=null;
          // 메뉴/사이드 토글 버튼 다시 보이기
          const menuToggle = document.getElementById('menuToggle');
          if (menuToggle) menuToggle.closest('div').style.display = '';
          const sideWrap = document.getElementById('sideToggle');
          if (sideWrap) sideWrap.closest('.side-wrap').style.display = '';
          addBot('주문을 수정하시려면 장바구니에서 메뉴를 조정해 주세요! 😊');
        }
      }
    );
    return true;
  }
  return false;
}

async function finalOrder() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const time = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  try {
    await fetch(WEBHOOK, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        주문시간: time,
        예약시간: orderState.time,
        고객이름: orderState.name,
        연락처: orderState.phone,
        주문메뉴: orderState.menuText,
        합계금액: orderState.total.toLocaleString()+'원'

  // 주문완료 메시지 + 스크린샷 버튼
  const orderSummary = `
    <div id="orderResult" style="background:#fff8ee;border-radius:14px;padding:16px;margin-bottom:10px;border:1.5px solid #F0E6D3;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #F0E6D3;">
        <div style="font-size:22px">🍗</div>
        <div>
          <div style="font-size:13px;font-weight:700;color:#2C1A0E">마니산닭강정 김포직영점</div>
          <div style="font-size:11px;color:#8B6A4E">070-4110-9480</div>
        </div>
      </div>
      <div style="font-size:15px;font-weight:700;color:#EF9F27;margin-bottom:10px">✅ 주문 완료!</div>
      <div style="font-size:13px;color:#2C1A0E;line-height:2;background:#fff;border-radius:10px;padding:10px 12px;">
        ${orderState.menuText.split(', ').map(m=>`<div>🍗 ${m}</div>`).join('')}
        <div style="margin-top:6px;padding-top:6px;border-top:1px dashed #F0E6D3;">⏰ 픽업: <strong>${orderState.time}</strong></div>
        <div>👤 <strong>${orderState.name}</strong>님</div>
        <div>📱 ${orderState.phone}</div>
        <div style="margin-top:4px;font-size:14px;font-weight:700;color:#EF9F27;">💰 합계: ${orderState.total.toLocaleString()}원</div>
      </div>
      <div style="margin-top:12px;padding:10px;background:#EF9F27;border-radius:10px;text-align:center;font-size:13px;font-weight:700;color:#2C1A0E">
        🏪 매장에서 키오스크로 결제해 주세요
      </div>
      <div style="margin-top:8px;font-size:12px;color:#8B6A4E;text-align:center">🔔 주문내용은 한 번만 표시됩니다. 필요시 스크린샷을 저장해 두세요! 감사합니다 😊🍗</div>
    </div>
    <button onclick="takeScreenshot()" style="width:100%;padding:11px;border-radius:12px;border:1.5px solid #EF9F27;background:#fff;font-size:13px;font-weight:700;color:#d4861a;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px">

    </button>`;

  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = icon() + `<div class="bubble" style="max-width:90%">${orderSummary}</div>`;

  msgsEl.scrollTop = msgsEl.scrollHeight;

  document.getElementById('inp').placeholder = '메뉴를 고른후에 주문하기를 눌러주세요';

  const cartHeaderElR = cartElR ? cartElR.querySelector('.cart-header') : null;

  if (cartItemsElR) cartItemsElR.style.display = '';

// ── 봇 메시지 ──
function icon() {
  return `<div class="bicon"><img src="${LOGO}" alt="로고" onerror="this.parentElement.innerHTML='🤖'"></div>`;
}

function addBot(html, withYN) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  let inner = `<div class="bubble">${html}`;
  if (withYN) {
    const id = 'yn' + Date.now();
    inner += `<div class="yn" id="${id}">
      <button class="yes" onclick="ynYes('${id}')">${withYN.yes}</button>
      <button class="no" onclick="ynNo('${id}')">${withYN.no}</button>
    </div>`;
    window['cb_'+id] = withYN;
  }
  inner += '</div>';
  div.innerHTML = icon() + inner;
  msgsEl.appendChild(div);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function ynYes(id) { disableYN(id); window['cb_'+id]?.onYes?.(); }
function ynNo(id) { disableYN(id); window['cb_'+id]?.onNo?.(); }
function disableYN(id) { document.querySelectorAll('#'+id+' button').forEach(b=>b.disabled=true); }

function addUser(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="bubble">${text}</div>`;
  msgsEl.appendChild(div);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = icon() + '<div class="typing"><span></span><span></span><span></span></div>';
  msgsEl.appendChild(div); msgsEl.scrollTop = msgsEl.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

function toggleCartItems() {
  const cartItemsEl = document.getElementById('cartItems');
  const cartHeaderEl = document.getElementById('cart').querySelector('.cart-header');
  const arrowEl = document.getElementById('cartToggleArrow');
  const isHidden = cartItemsEl.style.display === 'none' || cartItemsEl.style.display === '';
  if (isHidden) {
    cartItemsEl.style.display = 'flex';
    if (cartHeaderEl) cartHeaderEl.style.display = 'flex';
    if (arrowEl) arrowEl.style.transform = 'rotate(180deg)';
  } else {
    cartItemsEl.style.display = 'none';
    if (cartHeaderEl) cartHeaderEl.style.display = 'none';
    if (arrowEl) arrowEl.style.transform = 'rotate(0deg)';
  }
}

function toggleMenu() {
  const grid = document.getElementById('menuGrid');
  const arrow = document.getElementById('menuArrow');
  const isOpen = grid.style.display !== 'none';
  if (isOpen) {
    grid.style.display = 'none';
    arrow.style.transform = 'rotate(0deg)';
  } else {
    grid.style.display = 'grid';
    arrow.style.transform = 'rotate(180deg)';
  }
}

function toggleSide() {
  const list = document.getElementById('sideList');
  const arrow = document.getElementById('sideArrow');
  const isOpen = list.style.display === 'grid';
  if (isOpen) {
    list.style.display = 'none';
    arrow.style.transform = 'rotate(0deg)';
  } else {

// 품질철학/전체메뉴 로컬 응답
const LOCAL_ANSWERS = {
  '품질 철학이 뭐야?': `✅ <strong>마니산닭강정 품질철학</strong><br><br>🍗 <strong>신선한 재료</strong><br>매일 신선하게 들어오는 국내산 닭만 사용합니다.<br><br>🔥 <strong>당일 조리 원칙</strong><br>모든 메뉴는 주문 당일 조리하며, 남은 재료는 폐기합니다.<br><br>🧂 <strong>자체 개발 양념</strong><br>오랜 연구로 완성된 마니산만의 비법 소스를 사용합니다.<br><br>💛 <strong>식힘 공정</strong><br>기본 닭강정은 바삭함을 위해 식힘 공정을 거칩니다.<br>따뜻한강정 옵션으로 바로 따뜻하게도 즐기실 수 있어요!`,
  '전체 메뉴 보여줘': `📋 <strong>마니산닭강정 전체메뉴</strong><br><br>🍗 <strong>닭강정</strong><br>· 닭강정 기본 — 22,000원<br>· 닭강정 중 — 17,000원<br>· 순살후라이드 기본 — 21,000원<br>· 순살후라이드 중 — 16,000원<br><br>🍟 <strong>사이드메뉴</strong><br>· 케이준감자튀김 일반 — 5,500원<br>· 케이준감자튀김 허니버터맛 — 6,000원<br>· 케이준감자튀김 치즈맛 — 6,000원<br>· 치즈볼 — 5,500원<br>· 치즈뿌린치즈볼 — 6,000원<br>· 웅녀떡볶이 — 6,000원<br><br>📍 결제는 매장 키오스크에서 해주세요!`
};

async function ask(text) {
  // 로컬 응답이 있으면 API 호출 없이 바로 답변
  const localKey = Object.keys(LOCAL_ANSWERS).find(k => text.includes(k.replace('?','').trim()) || k.includes(text.trim()));
  if (localKey) {
    history.push({role:'user',content:text});
    showTyping();
    await new Promise(r => setTimeout(r, 400));
    hideTyping();
    const reply = LOCAL_ANSWERS[localKey];
    history.push({role:'assistant',content:reply});
    addBot(reply);
    return;
  }
  history.push({role:'user',content:text});
  showTyping();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:SYSTEM,messages:history})
    });
    if (!res.ok) throw new Error('API error ' + res.status);
    const data = await res.json();
    hideTyping();
    if (data.error) throw new Error(data.error.message);
    const reply = data.content?.find(b=>b.type==='text')?.text || '잠시 후 다시 시도해 주세요.';
    history.push({role:'assistant',content:reply});
    addBot(reply.replace(/\n/g,'<br>'));
  } catch(e) {
    hideTyping();
    addBot('궁금한 점은 📞 <strong>070-4110-9480</strong>으로 문의해 주세요!');
  }
}

function takeScreenshot() {
  const target = document.getElementById('orderResult');
  if (!target) {
    alert('주문완료 화면을 찾을 수 없어요.');
    return;
  }
  html2canvas(target, {
    scale: 3,
    useCORS: true,
    backgroundColor: '#fff8ee',
  }).then(canvas => {
    const link = document.createElement('a');
    link.download = '마니산닭강정_주문내역.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
}

function send() {

// ===== 품절 관리 =====
const ADMIN_PW = '1234';  // ← 비밀번호 여기서 변경하세요

// 모든 메뉴 키
const ALL_MENUS = [
  '닭강정 기본','순살후라이드 기본','닭강정 중','순살후라이드 중',
  '케이준감자튀김 일반','케이준감자튀김 허니버터맛','케이준감자튀김 치즈맛',
  '치즈볼','치즈뿌린치즈볼','웅녀떡볶이'
];

// 품절 상태 (메모리 저장 – 페이지 새로고침 시 초기화)
let soldOutSet = new Set(JSON.parse(localStorage.getItem('soldOut') || '[]'));

function saveSoldOut() {
  localStorage.setItem('soldOut', JSON.stringify([...soldOutSet]));
}

// 메뉴 버튼 클릭 → 품절이면 안내, 아니면 기존 addCart
function menuClick(name, price) {
  if (soldOutSet.has(name)) {
    addBot('❌ <strong>' + name + '</strong>은(는) 현재 <b>품절</b>입니다.<br>다른 메뉴를 선택해 주세요!');
    return;
  }
  addCart(name, price);
}

// 메뉴 버튼 UI 갱신
function refreshSoldOut() {
  document.querySelectorAll('[data-menu]').forEach(btn => {
    const key = btn.getAttribute('data-menu');
    if (soldOutSet.has(key)) {
      btn.classList.add('sold-out-btn');
    } else {
      btn.classList.remove('sold-out-btn');
    }
  });
}

// 비밀번호 모달 열기 (헤더 로고 5번 탭)
let logoTapCount = 0, logoTapTimer = null;
function logoTap() {
  logoTapCount++;
  clearTimeout(logoTapTimer);
  logoTapTimer = setTimeout(() => { logoTapCount = 0; }, 2000);
  if (logoTapCount >= 5) {
    logoTapCount = 0;
    openPwModal();
  }
}
function openPwModal() {
  document.getElementById('pwInput').value = '';
  document.getElementById('pwErr').textContent = '';
  document.getElementById('pwModal').classList.add('open');
  setTimeout(() => document.getElementById('pwInput').focus(), 100);
}
function closePwModal() {
  document.getElementById('pwModal').classList.remove('open');
}
function confirmPw() {
  const val = document.getElementById('pwInput').value;
  if (val === ADMIN_PW) {
    closePwModal();
    openAdmin();
  } else {
    document.getElementById('pwErr').textContent = '❌ 비밀번호가 틀렸습니다.';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

// 관리자 모달 열기
function openAdmin() {
  const grid = document.getElementById('adminGrid');
  grid.innerHTML = '';
  ALL_MENUS.forEach(name => {
    const isSoldOut = soldOutSet.has(name);
    const div = document.createElement('div');
    div.className = 'admin-item' + (isSoldOut ? ' soldout' : '');
    div.innerHTML = '<input type="checkbox"' + (isSoldOut ? ' checked' : '') + '> ' + name;
    const cb = div.querySelector('input');
    cb.addEventListener('change', () => {
      if (cb.checked) {
        soldOutSet.add(name);
        div.classList.add('soldout');
      } else {
        soldOutSet.delete(name);
        div.classList.remove('soldout');
      }
      saveSoldOut();
      refreshSoldOut();
    });
    grid.appendChild(div);
  });
  document.getElementById('adminModal').classList.add('open');
}
function closeAdmin() {
  document.getElementById('adminModal').classList.remove('open');
}
