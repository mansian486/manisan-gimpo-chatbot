<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마니산닭강정 김포직영점</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#EF9F27;--pd:#d4861a;--pl:#FAEEDA;
  --bg:#FDF8F0;--sf:#fff;--bd:#F0E6D3;
  --tx:#2C1A0E;--ts:#8B6A4E;
  --fr:#4A90D9;--fl:#EAF3FF;--fd:#2f6fb5;
}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.wrap{width:100%;max-width:420px;background:var(--sf);border-radius:24px;box-shadow:0 8px 40px rgba(239,159,39,.15);overflow:hidden;display:flex;flex-direction:column;height:90vh;max-height:900px}
.hd{background:var(--primary);padding:14px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hd-logo{width:46px;height:46px;border-radius:50%;overflow:hidden;background:#fff;flex-shrink:0}
.hd-logo img{width:100%;height:100%;object-fit:cover}
.hd-nm{font-size:14px;font-weight:700;color:#fff}
.hd-sb{font-size:11px;color:rgba(255,255,255,.85);margin-top:2px}
.hd-r{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.ph{background:rgba(255,255,255,.25);border:none;border-radius:16px;padding:5px 10px;font-size:12px;color:#fff;font-weight:600;text-decoration:none;display:block}
.bdg{background:rgba(255,255,255,.2);border-radius:20px;padding:3px 8px;font-size:11px;color:#fff;display:flex;align-items:center;gap:4px}
.dot{width:6px;height:6px;border-radius:50%;background:#7FE87F}
.hrs{background:#fff8ee;border-bottom:1px solid var(--bd);padding:7px 16px;font-size:12px;color:var(--ts);flex-shrink:0}
.hrs strong{color:var(--tx)}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:8px;align-items:flex-end}
.msg.bot{flex-direction:row}
.msg.user{flex-direction:row-reverse}
.ico{width:30px;height:30px;border-radius:50%;overflow:hidden;background:var(--pl);flex-shrink:0}
.ico img{width:100%;height:100%;object-fit:cover}
.bbl{padding:11px 15px;border-radius:18px;font-size:14px;line-height:1.65;max-width:82%;color:var(--tx);word-break:keep-all}
.bot .bbl{background:#fff;border:1px solid var(--bd);border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.user .bbl{background:var(--primary);color:#2C1A0E;border-bottom-right-radius:4px;font-weight:500}
.yn{display:flex;gap:8px;margin-top:8px}
.yb{flex:1;padding:9px 0;border-radius:12px;border:1.5px solid var(--primary);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.yb.y{background:var(--primary);color:#2C1A0E}
.yb.n{background:#fff;color:var(--pd)}
.yb:disabled{opacity:.4;cursor:default}
.tp{background:#fff;border:1px solid var(--bd);border-radius:18px;border-bottom-left-radius:4px;padding:14px 18px;display:flex;gap:5px;align-items:center}
.tp span{width:7px;height:7px;border-radius:50%;background:var(--primary);animation:bc 1.2s infinite;display:block}
.tp span:nth-child(2){animation-delay:.2s}
.tp span:nth-child(3){animation-delay:.4s}
@keyframes bc{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
/* 장바구니 */
.cart{margin:0 14px 6px;background:#fff;border:2px solid var(--primary);border-radius:16px;overflow:hidden;flex-shrink:0;display:none}
.c-hd{background:var(--primary);padding:8px 12px;display:flex;justify-content:space-between;align-items:center}
.c-hd span{font-size:13px;font-weight:700;color:#2C1A0E}
.c-bg{background:#2C1A0E;color:var(--primary);border-radius:10px;padding:2px 8px;font-size:12px;font-weight:700}
.c-list{padding:8px 12px;display:flex;flex-direction:column;gap:6px;max-height:110px;overflow-y:auto}
.ci{display:flex;align-items:center;gap:6px;font-size:13px}
.ci-nm{flex:1;font-weight:500;font-size:12px}
.ci-pr{font-size:12px;color:var(--ts);min-width:52px;text-align:right}
.qw{display:flex;align-items:center;gap:4px}
.qb{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--bd);background:#fff;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx)}
.qn{font-weight:700;min-width:16px;text-align:center;font-size:13px}
.db{width:20px;height:20px;border-radius:50%;border:none;background:#FFE5E5;color:#e53e3e;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
.c-tot{border-top:1px dashed var(--bd);padding:7px 12px;display:flex;justify-content:space-between}
.c-tot span{font-size:13px;color:var(--ts)}
.c-tot strong{font-size:15px;color:var(--pd);font-weight:700}
.c-ob{width:calc(100% - 24px);margin:0 12px 8px;padding:10px;border-radius:12px;border:none;background:var(--primary);color:#2C1A0E;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
/* 메뉴 */
.mn-sec{padding:8px 14px 4px;flex-shrink:0;border-top:1px solid var(--bd);background:var(--bg)}
.mn-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.mn-btn{border-radius:12px;padding:0;cursor:pointer;font-family:inherit;border:2px solid var(--primary);background:var(--sf);overflow:hidden;display:flex;align-items:center;height:54px;width:100%}
.mn-btn:active{opacity:.8}
.mn-btn:disabled{opacity:.45;cursor:not-allowed}
.mn-btn img{width:54px;height:54px;object-fit:cover;flex-shrink:0}
.mn-info{flex:1;padding:0 8px;text-align:left}
.mn-nm{font-size:12px;font-weight:700;color:var(--tx);display:block}
.mn-pr{font-size:11px;color:var(--ts);display:block;margin-top:2px}
.mn-btn.fr{border-color:#C8860A;background:#fff}
.mn-btn.fr .mn-nm{color:#7A5000}
.mn-btn.fr .mn-pr{color:#C8860A;opacity:.8}
.mn-btn:disabled .mn-nm{color:#aaa !important}
.mn-btn:disabled .mn-pr{color:#aaa !important}
/* 사이드 */
.sd-tg{width:100%;background:var(--sf);border:1.5px solid var(--bd);border-radius:10px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--ts);cursor:pointer;font-family:inherit;display:flex;justify-content:space-between;margin-bottom:4px}
.sd-area{display:none;flex-wrap:wrap;gap:5px;margin-bottom:5px}
.sd-area.open{display:flex}
.fr-notice{background:#FFE5E5;border:1px solid #FCA5A5;border-radius:10px;padding:6px 12px;font-size:11px;color:#c53030;font-weight:600;text-align:center;margin-bottom:5px;display:none}
.sd-btn{background:var(--sf);border:1.5px solid #A0C4FF;border-radius:20px;padding:5px 9px;font-size:11px;font-weight:500;color:var(--fd);cursor:pointer;font-family:inherit;white-space:nowrap}
.sd-btn:active{background:var(--fr);color:#fff}
.sd-btn:disabled{background:#f0f0f0 !important;border-color:#ddd !important;color:#aaa !important;cursor:not-allowed}
/* 기타 */
.etc{padding:0 14px 8px;display:flex;gap:6px;flex-shrink:0;background:var(--bg)}
.qbtn{background:var(--sf);border:1.5px solid var(--bd);border-radius:20px;padding:6px 8px;font-size:11px;font-weight:500;color:var(--ts);cursor:pointer;font-family:inherit;flex:1;text-align:center}
.inp-w{padding:8px 14px 14px;display:flex;gap:10px;background:var(--sf);border-top:1px solid var(--bd);flex-shrink:0}
.inp-w input{flex:1;padding:10px 14px;border-radius:24px;border:1.5px solid var(--bd);background:var(--bg);font-size:14px;color:var(--tx);font-family:inherit;outline:none}
.inp-w input:focus{border-color:var(--primary)}
.inp-w input::placeholder{color:var(--ts)}
.snd{width:42px;height:42px;border-radius:50%;background:var(--primary);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.snd svg{width:18px;height:18px;fill:white}
</style>
</head>

var cart = [];
var orderSt = null;
var chatHist = [];
var sideOpen = false;

var msgsEl = document.getElementById("msgs");
var inpEl = document.getElementById("inp");

function makeIcon() {
  var d = document.createElement("div");
  d.className = "ico";
  var img = document.createElement("img");
  img.src = LOGO;
  d.appendChild(img);
  return d;
}

function botMsg(html) {
  var row = document.createElement("div");
  row.className = "msg bot";
  row.appendChild(makeIcon());
  var b = document.createElement("div");
  b.className = "bbl";
  b.innerHTML = html;
  row.appendChild(b);
  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function userMsg(text) {
  var row = document.createElement("div");
  row.className = "msg user";
  var b = document.createElement("div");
  b.className = "bbl";
  b.textContent = text;
  row.appendChild(b);
  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function askYN(html, yTxt, nTxt, onY, onN) {
  var row = document.createElement("div");
  row.className = "msg bot";
  row.appendChild(makeIcon());
  var b = document.createElement("div");
  b.className = "bbl";
  b.innerHTML = html;
  var yw = document.createElement("div");
  yw.className = "yn";
  var yb = document.createElement("button");
  yb.className = "yb y";
  yb.textContent = yTxt;
  var nb = document.createElement("button");
  nb.className = "yb n";
  nb.textContent = nTxt;
  yb.onclick = function() { yb.disabled = true; nb.disabled = true; onY(); };
  nb.onclick = function() { yb.disabled = true; nb.disabled = true; onN(); };
  yw.appendChild(yb);
  yw.appendChild(nb);
  b.appendChild(yw);
  row.appendChild(b);
  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function showTp() {
  var row = document.createElement("div");
  row.className = "msg bot";
  row.id = "tp";
  row.appendChild(makeIcon());
  var d = document.createElement("div");
  d.className = "tp";
  d.innerHTML = "<span></span><span></span><span></span>";
  row.appendChild(d);
  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
function rmTp() { var t = document.getElementById("tp"); if (t) t.remove(); }

function renderCart() {
  var cartEl = document.getElementById("cart");
  var clist = document.getElementById("clist");
  var ctot = document.getElementById("ctot");
  var cbg = document.getElementById("cbg");
  if (!cart.length) { cartEl.style.display = "none"; return; }
  cartEl.style.display = "block";
  var tq = 0, tp = 0;
  for (var i = 0; i < cart.length; i++) { tq += cart[i].qty; tp += cart[i].price * cart[i].qty; }
  cbg.textContent = tq + "개";
  ctot.textContent = tp.toLocaleString() + "원";
  clist.innerHTML = "";
  for (var i = 0; i < cart.length; i++) {
    (function(idx) {
      var row = document.createElement("div");
      row.className = "ci";
      var nm = document.createElement("span");
      nm.className = "ci-nm";
      nm.textContent = cart[idx].name;
      var qw = document.createElement("div");
      qw.className = "qw";
      var qm = document.createElement("button");
      qm.className = "qb";
      qm.textContent = "-";
      qm.onclick = function() { cart[idx].qty--; if (cart[idx].qty <= 0) cart.splice(idx, 1); renderCart(); };
      var qn = document.createElement("span");
      qn.className = "qn";
      qn.textContent = cart[idx].qty;
      var qp = document.createElement("button");
      qp.className = "qb";
      qp.textContent = "+";
      qp.onclick = function() { cart[idx].qty++; renderCart(); };
      qw.appendChild(qm); qw.appendChild(qn); qw.appendChild(qp);
      var pr = document.createElement("span");
      pr.className = "ci-pr";
      pr.textContent = (cart[idx].price * cart[idx].qty).toLocaleString() + "원";
      var db = document.createElement("button");
      db.className = "db";
      db.textContent = "x";
      db.onclick = function() { cart.splice(idx, 1); renderCart(); if (!cart.length) botMsg("장바구니가 비었어요 😊"); };
      row.appendChild(nm); row.appendChild(qw); row.appendChild(pr); row.appendChild(db);
      clist.appendChild(row);
    })(i);
  }
}

function addCart(name, price, isDak) {
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].name === name) { cart[i].qty++; renderCart(); botMsg(name + " +1개 추가됐어요!"); return; }
  }
  if (isDak) {
    var n = name, p = price;
    askYN(
      "🍗 <strong>" + n + "</strong>을 담겠습니다!<br><br>🔥 <strong>따뜻한 강정 옵션</strong> (+2,000원) 추가할까요?<br><small>※ 기본은 식힘공정으로 바삭하게 제공</small>",
      "✅ 네, 따뜻하게요",
      "❌ 아니요, 기본으로요",
      function() { cart.push({ name: n + "(따뜻)", price: p + 2000, qty: 1 }); renderCart(); botMsg("🔥 따뜻한 강정 옵션이 추가됐어요!"); },
      function() { cart.push({ name: n, price: p, qty: 1 }); renderCart(); botMsg("👍 " + n + "을 장바구니에 담았어요!"); }
    );
  } else {
    cart.push({ name: name, price: price, qty: 1 });
    renderCart();
    botMsg("🛒 " + name + "을 장바구니에 담았어요!");
  }
}

function startOrder() {
  if (!cart.length) { botMsg("장바구니가 비어있어요!"); return; }
  var ml = "", tp = 0, md = "";
  for (var i = 0; i < cart.length; i++) {
    ml += cart[i].name + " x" + cart[i].qty;
    if (i < cart.length - 1) ml += ", ";
    tp += cart[i].price * cart[i].qty;
    md += cart[i].name + " x" + cart[i].qty + " = " + (cart[i].price * cart[i].qty).toLocaleString() + "원<br>";
  }
  orderSt = { ml: ml, md: md, total: tp, step: "time" };
  botMsg("📋 <strong>주문 내역</strong><br>" + md + "<br>⏰ 픽업 예약 시간을 알려주세요! (예: 오후 3시)");
}

    "<div style='font-size:11px;color:#8B6A4E;margin-top:2px'>마니산닭강정 김포직영점</div></div>" +
    "<div style='background:#fff;border-radius:10px;padding:12px;font-size:13px;line-height:2'>" +
    "<div style='display:flex;justify-content:space-between;border-bottom:1px dashed #F0E6D3;padding-bottom:8px;margin-bottom:8px'><span style='color:#8B6A4E'>주문번호</span><span style='font-weight:700;color:#EF9F27'>" + on + "</span></div>" +

function handleTxt(text) {
  if (orderSt) {
    if (orderSt.step === "time") { orderSt.time = text; orderSt.step = "name"; botMsg("👤 성함을 알려주세요!"); return; }
    if (orderSt.step === "name") { orderSt.name = text; orderSt.step = "phone"; botMsg("📱 연락처를 알려주세요! (예: 010-1234-5678)"); return; }
    if (orderSt.step === "phone") {
      orderSt.phone = text; orderSt.step = "confirm";
      var sum = "📋 <strong>주문 확인</strong><br><br>" + orderSt.md + "⏰ 픽업: " + orderSt.time + "<br>👤 " + orderSt.name + "님<br>📱 " + text + "<br>💰 합계: " + orderSt.total.toLocaleString() + "원<br><br>주문 확정할까요?";
      askYN(sum, "✅ 네, 주문확정!", "❌ 취소할게요",
        function() { finalOrder(); },
        function() { orderSt = null; botMsg("주문이 취소됐어요. 다시 메뉴를 선택해주세요! 😊"); }
      );
      return;
    }
  }
  aiChat(text);
}

function aiChat(text) {
  chatHist.push({ role: "user", content: text });
  showTp();
  fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 600,
      system: "당신은 마니산닭강정 김포직영점의 주문 AI 챗봇입니다. 친절하고 간결하게 안내하세요.

닭강정 기본 22,000원 / 중 17,000원 (따뜻한 강정 옵션 +2,000원)
순살 후라이드 기본 21,000원 / 중 16,000원

[품질] 매일 새 기름, 당일생산 당일판매, 매일 마감 청소
[영업] 연중무휴 11:00~23:00 / 전화: 070-4110-9480",
      messages: chatHist
    })
  }).then(function(r) { return r.json(); }).then(function(d) {
    rmTp();
    var reply = d.content && d.content[0] ? d.content[0].text : "잠시 후 다시 시도해 주세요.";
    chatHist.push({ role: "assistant", content: reply });
    botMsg(reply.replace(/
/g, "<br>"));
  }).catch(function() { rmTp(); botMsg("연결에 문제가 생겼어요. 잠시 후 다시 시도해 주세요."); });
}

  var day = now.getDay();
  var closed = tot >= ((day === 0 || day === 5 || day === 6) ? 21 * 60 + 30 : 21 * 60);
  var ids = ["fr1","fr2","ca1","ca2","ca3","cb1","cb2"];
  for (var i = 0; i < ids.length; i++) { var b = document.getElementById(ids[i]); if (b) b.disabled = closed; }
  document.getElementById("frn").style.display = closed ? "block" : "none";
}
