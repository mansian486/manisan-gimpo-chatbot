<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마니산닭강정 김포직영점 주문 챗봇</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #EF9F27; --primary-dark: #d4861a; --primary-light: #FAEEDA;
    --bg: #FDF8F0; --surface: #FFFFFF; --border: #F0E6D3;
    --text: #2C1A0E; --text-sub: #8B6A4E; --radius: 18px;
  }
  body { font-family: "Noto Sans KR", sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .chat-container { width: 100%; max-width: 420px; background: var(--surface); border-radius: 24px; box-shadow: 0 8px 40px rgba(239,159,39,0.15), 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; display: flex; flex-direction: column; height: 90vh; max-height: 820px; }

  /* 헤더 */
  .header { background: var(--primary); padding: 14px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .header-logo { width: 46px; height: 46px; border-radius: 50%; overflow: hidden; background: white; flex-shrink: 0; }
  .header-logo img { width: 100%; height: 100%; object-fit: cover; }
  .header-info .store-name { font-size: 14px; font-weight: 700; color: #fff; line-height: 1.3; }
  .header-info .store-sub { font-size: 11px; color: rgba(255,255,255,0.85); margin-top: 2px; }
  .header-right { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .phone-btn { background: rgba(255,255,255,0.25); border: none; border-radius: 16px; padding: 5px 10px; font-size: 12px; color: #fff; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; text-decoration: none; transition: background 0.15s; }
  .phone-btn:hover { background: rgba(255,255,255,0.4); }
  .header-badge { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 3px 8px; font-size: 11px; color: #fff; display: flex; align-items: center; gap: 4px; }
  .online-dot { width: 6px; height: 6px; border-radius: 50%; background: #7FE87F; }

  /* 영업시간 배너 */
  .hours-banner { background: #fff8ee; border-bottom: 1px solid var(--border); padding: 7px 16px; font-size: 12px; color: var(--text-sub); flex-shrink: 0; }
  .hours-banner strong { color: var(--text); }

  /* 메시지 */
  .messages { flex: 1; overflow-y: auto; padding: 16px 16px 8px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .msg { display: flex; gap: 8px; align-items: flex-end; }
  .msg.bot { flex-direction: row; }
  .msg.user { flex-direction: row-reverse; }
  .bot-icon { width: 30px; height: 30px; border-radius: 50%; background: var(--primary-light); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; overflow: hidden; }
  .bot-icon img { width: 100%; height: 100%; object-fit: cover; }
  .bubble { padding: 11px 15px; border-radius: var(--radius); font-size: 14px; line-height: 1.65; max-width: 78%; color: var(--text); word-break: keep-all; }
  .bot .bubble { background: #fff; border: 1px solid var(--border); border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .user .bubble { background: var(--primary); color: #2C1A0E; border-bottom-right-radius: 4px; font-weight: 500; }

  /* 예/아니오 버튼 */
  .yn-btns { display: flex; gap: 8px; margin-top: 8px; }
  .yn-btn { flex: 1; padding: 9px 0; border-radius: 12px; border: 1.5px solid var(--primary); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .yn-btn.yes { background: var(--primary); color: #2C1A0E; }
  .yn-btn.no { background: #fff; color: var(--primary-dark); }
  .yn-btn:disabled { opacity: 0.4; cursor: default; }

  /* 타이핑 */
  .typing-bubble { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); border-bottom-left-radius: 4px; padding: 14px 18px; display: flex; gap: 5px; align-items: center; }
  .typing-bubble span { width: 7px; height: 7px; border-radius: 50%; background: var(--primary); animation: bounce 1.2s infinite; display: block; }
  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* 대표메뉴 버튼 */
  .menu-grid { padding: 10px 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex-shrink: 0; border-top: 1px solid var(--border); background: var(--bg); }
  .menu-btn { background: var(--surface); border: 1.5px solid var(--primary); border-radius: 14px; padding: 10px 8px; font-size: 13px; font-weight: 600; color: var(--primary-dark); cursor: pointer; font-family: inherit; transition: all 0.15s; text-align: center; line-height: 1.4; }
  .menu-btn:hover { background: var(--primary); color: #fff; }
  .menu-btn .price { font-size: 12px; font-weight: 400; color: var(--text-sub); display: block; margin-top: 2px; }
  .menu-btn:hover .price { color: rgba(255,255,255,0.85); }

  /* 기타 버튼 */
  .etc-area { padding: 0 14px 10px; display: flex; gap: 6px; flex-shrink: 0; background: var(--bg); flex-wrap: nowrap; }
  .qbtn { background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px; padding: 6px 8px; font-size: 11px; font-weight: 500; color: var(--text-sub); cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap; flex: 1; text-align: center; }
  .qbtn:hover { border-color: var(--primary); color: var(--primary-dark); }

  /* 입력 */
  .input-area { padding: 8px 14px 14px; display: flex; gap: 10px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .input-area input { flex: 1; padding: 11px 16px; border-radius: 24px; border: 1.5px solid var(--border); background: var(--bg); font-size: 14px; color: var(--text); font-family: inherit; outline: none; transition: border-color 0.2s; }
  .input-area input:focus { border-color: var(--primary); }
  .input-area input::placeholder { color: var(--text-sub); }
  .send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--primary); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send-btn:hover { background: var(--primary-dark); }
  .send-btn svg { width: 18px; height: 18px; fill: white; }
</style>
</head>

function addMsg(html, role) {

    <button class="yn-btn yes" onclick="ynClick('${btnId}', true)">${yesLabel}</button>
    <button class="yn-btn no" onclick="ynClick('${btnId}', false)">${noLabel}</button>
  </div></div>`;
  msgsEl.appendChild(div);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  window['yn_cb_' + btnId] = {yes: onYes, no: onNo};
}

function ynClick(btnId, isYes) {
  const container = document.getElementById(btnId);
  if (!container) return;
  const btns = container.querySelectorAll('button');
  btns.forEach(b => b.disabled = true);
  const cb = window['yn_cb_' + btnId];
  if (cb) { isYes ? cb.yes() : cb.no(); }
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = `${botIcon()}<div class="typing-bubble"><span></span><span></span><span></span></div>`;
  msgsEl.appendChild(div); msgsEl.scrollTop = msgsEl.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

// 대표메뉴 버튼 클릭
function orderMenu(menuType, size, basePrice) {
  const menuName = menuType === '닭강정' ? `닭강정 ${size}` : `순살 후라이드 ${size}`;
  addMsg(menuName + ' 주문할게요', 'user');

  if (menuType === '닭강정') {
    // 따뜻한 강정 옵션 물어보기
    addBotWithYN(
      `🍗 <strong>${menuName}</strong> (${basePrice.toLocaleString()}원) 선택하셨어요!<br><br>🔥 <strong>따뜻한 강정 옵션</strong> (+2,000원)을 추가하시겠어요?<br><span style="font-size:12px;color:#8B6A4E">※ 기본은 식힘공정으로 바삭하게 제공됩니다</span>`,
      '✅ 네, 따뜻하게요', '❌ 아니요, 기본으로요',
      () => {
        orderState = {menuName, basePrice, warm: true};
        const total = basePrice + 2000;
        addMsg('네, 따뜻하게요! 😊', 'user');
        askPickupTime(menuName + ' (따뜻한 옵션)', total);
      },
      () => {
        orderState = {menuName, basePrice, warm: false};
        addMsg('아니요, 기본으로요!', 'user');
        askPickupTime(menuName, basePrice);
      }
    );
  } else {
    orderState = {menuName, basePrice, warm: false};
    askPickupTime(menuName, basePrice);
  }
}

// 픽업 시간 입력 받기
function askPickupTime(menuLabel, total) {
  addMsg(`📋 <strong>${menuLabel}</strong><br>💰 ${total.toLocaleString()}원<br><br>⏰ 픽업 예약 시간을 알려주세요! (예: 오후 3시, 15:30)`, 'bot');
  orderState.menuLabel = menuLabel;
  orderState.total = total;
  orderState.step = 'time';
}

// 이름 입력 받기
function askName(time) {
  orderState.time = time;
  orderState.step = 'name';
  addMsg(`👤 성함을 알려주세요!`, 'bot');
}

// 연락처 입력 받기
function askPhone(name) {
  orderState.name = name;
  orderState.step = 'phone';
  addMsg(`📱 연락처를 알려주세요! (예: 010-1234-5678)`, 'bot');
}

// 주문 확인
function confirmOrder(phone) {
  orderState.phone = phone;
  orderState.step = 'confirm';
  const summary = `📋 <strong>주문 확인</strong><br><br>
🍗 ${orderState.menuLabel}<br>
⏰ 픽업: ${orderState.time}<br>
👤 ${orderState.name}님<br>
📱 ${orderState.phone}<br>
💰 합계: ${orderState.total.toLocaleString()}원<br><br>
위 내용으로 주문 확정할까요?`;
  addBotWithYN(summary, '✅ 네, 주문확정!', '❌ 취소할게요',
    () => { finalizeOrder(); },
    () => {
      orderState = null;
      addMsg('주문이 취소됐어요. 다시 메뉴를 선택해주세요! 😊', 'bot');
    }
  );
}

async function finalizeOrder() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const timeStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  try {
    await fetch(WEBHOOK, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        주문시간: timeStr, 예약시간: orderState.time,
        고객이름: orderState.name, 연락처: orderState.phone,
        주문메뉴: orderState.menuLabel, 합계금액: orderState.total.toLocaleString() + '원'
      }), mode: 'no-cors'
    });
  } catch(e) {}
  addMsg(`✅ <strong>주문 완료!</strong><br><br>🍗 ${orderState.menuLabel}<br>⏰ 픽업: ${orderState.time}<br>👤 ${orderState.name}님<br>💰 ${orderState.total.toLocaleString()}원<br><br>맛있게 준비할게요! 감사합니다 😊`, 'bot');
  orderState = null;
}

// 텍스트 입력 처리
async function handleInput(text) {
  // 주문 진행 중 단계별 처리
  if (orderState) {
    if (orderState.step === 'time') { askName(text); return; }
    if (orderState.step === 'name') { askPhone(text); return; }
    if (orderState.step === 'phone') { confirmOrder(text); return; }
  }
  // 일반 AI 대화
  await ask(text);
}

async function ask(userText) {
  history.push({role: 'user', content: userText});
  showTyping();
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({model: 'claude-sonnet-4-20250514', max_tokens: 800, system: SYSTEM, messages: history})
    });
    const data = await resp.json();
    removeTyping();
    const reply = data.content?.find(b => b.type === 'text')?.text || '잠시 후 다시 시도해 주세요.';
    history.push({role: 'assistant', content: reply});
    addMsg(reply.replace(/\n/g,'<br>'), 'bot');
  } catch(e) {
    removeTyping();
    addMsg('연결에 문제가 생겼어요. 잠시 후 다시 시도해 주세요.', 'bot');
  }
}

function quick(text) { addMsg(text, 'user'); ask(text); }

function send() {
  const text = inp.value.trim(); if (!text) return;
  inp.value = ''; addMsg(text, 'user'); handleInput(text);
}
